<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>용량 계산기</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: #fff;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  .container {
    width: 420px;
    background: rgba(255, 255, 255, 0.05);
    border-radius: 20px;
    padding: 25px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.4);
    backdrop-filter: blur(10px);
  }

  h2 {
    text-align: center;
    margin-bottom: 20px;
  }

  input[type="file"] {
    width: 100%;
    padding: 12px;
    border-radius: 12px;
    border: none;
    background: #334155;
    color: white;
    cursor: pointer;
  }

  .list {
    margin-top: 15px;
    max-height: 160px;
    overflow-y: auto;
  }

  .list li {
    font-size: 13px;
    padding: 6px 0;
    border-bottom: 1px solid rgba(255,255,255,0.1);
  }

  .card {
    margin-top: 20px;
    padding: 15px;
    background: rgba(255,255,255,0.08);
    border-radius: 15px;
  }

  .card p {
    margin: 8px 0;
    font-size: 14px;
  }

  .value {
    font-weight: bold;
    color: #38bdf8;
  }
</style>
</head>

<body>

<div class="container">
  <h2>📁 용량 계산기</h2>

  <input type="file" id="files" multiple accept="image/*,video/*">

  <ul class="list" id="list"></ul>

  <div class="card">
    <p>MB: <span class="value" id="mb">0</span></p>
    <p>GB: <span class="value" id="gb">0</span></p>
    <p>TB: <span class="value" id="tb">0</span></p>
  </div>
</div>

<script>
const input = document.getElementById("files");
const list = document.getElementById("list");

const mbText = document.getElementById("mb");
const gbText = document.getElementById("gb");
const tbText = document.getElementById("tb");

input.addEventListener("change", function () {
  list.innerHTML = "";

  let totalBytes = 0;

  Array.from(this.files).forEach(file => {
    totalBytes += file.size;

    const sizeMB = file.size / (1024 * 1024);

    const li = document.createElement("li");
    li.textContent = `📄 ${file.name} (${sizeMB.toFixed(2)} MB)`;
    list.appendChild(li);
  });

  const MB = totalBytes / (1024 * 1024);
  const GB = totalBytes / (1024 * 1024 * 1024);
  const TB = totalBytes / (1024 * 1024 * 1024 * 1024);

  mbText.textContent = MB.toFixed(2);
  gbText.textContent = GB.toFixed(4);
  tbText.textContent = TB.toFixed(6);
});
</script>

</body>
</html>
